site_name: Assertive Mock API
site_url: https://peter-daly.github.io/assertive-mock-api/

repo_name: peter-daly/assertive-mock-api
repo_url: https://github.com/peter-daly/assertive-mock-api

nav:
  - Home: index.md
  - Server:
      - Overview: server/overview.md
      - Docker Compose Deploy: server/docker-compose.md
      - API Usage: server/usage.md
      - Admin Pages: server/admin-pages.md
      - Matching Scenarios: server/matching-scenarios.md
  - Client:
      - Overview: client/overview.md
      - Session Usage: client/sessions.md
      - Scoped Usage: client/scopes.md
      - Advanced Scopes: client/advanced-scopes.md
  - Examples:
      - End-to-End: examples/e2e.md

theme:
  name: material

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
