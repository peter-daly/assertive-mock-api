<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mock API Admin</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f3f6f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --accent: #0369a1;
      --border: #dbe3ec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1.5rem;
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 50%);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .header a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1, h2 { margin: 0.5rem 0; }
    .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    .full { grid-column: 1 / -1; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Assertive Mock API Admin</h1>
      <a href="/__admin__/stubs/new">Create New Stub</a>
    </div>

    <div class="layout">
      <section id="stubs-panel"
        class="panel full"
        hx-get="/__admin__/partials/stubs"
        hx-trigger="load, every {{ poll_interval }}"
        hx-swap="innerHTML">
      </section>

      <section id="requests-panel"
        class="panel"
        hx-get="/__admin__/partials/requests"
        hx-trigger="load, every {{ poll_interval }}"
        hx-swap="innerHTML">
      </section>

      <section id="scopes-panel"
        class="panel"
        hx-get="/__admin__/partials/scopes"
        hx-trigger="load, every {{ poll_interval }}"
        hx-swap="innerHTML">
      </section>
    </div>
  </div>
</body>
</html>
